<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>小小換錢王 💰</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@flaticon/flaticon-uicons@3/css/all/all.css">
<script src="https://cdn.jsdelivr.net/npm/@lottiefiles/lottie-player@2/dist/lottie-player.js"></script>
<!-- icons: Flaticon Uicons (靜態) + LottieFiles (動態) -->
<style>
:root {
  --orange:#FF6B35; --teal:#4ECDC4; --yellow:#FFD93D;
  --green:#6BCB77;  --red:#FF6B6B;  --purple:#9B5DE5;
  --indigo:#4F46E5; --text:#2D3436; --muted:#636e72;
  --white:#FFFFFF;
  --bg-warm:#FFF9F0;
  --shadow:0 6px 24px rgba(0,0,0,0.14);
  --shadow-sm:0 3px 12px rgba(0,0,0,0.09);
  --clay-outer:0 8px 20px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.06);
  --clay-inner:inset 0 -4px 0 rgba(0,0,0,0.08);
  --clay-hover:0 12px 28px rgba(0,0,0,0.14), 0 4px 8px rgba(0,0,0,0.08);
  --radius:20px; --radius-sm:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{overscroll-behavior:none;overscroll-behavior-y:none;}
body{
  font-family:'Nunito','Noto Sans TC',sans-serif;
  background:var(--bg-warm);
  min-height:100vh;min-height:100dvh;
  color:var(--text);user-select:none;overflow-x:hidden;touch-action:manipulation;
}
.screen{
  display:none;flex-direction:column;align-items:center;
  min-height:100vh;min-height:100dvh;
  padding:24px 18px 32px;
}
.screen.active{display:flex;animation:pageEnter 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);}
@keyframes pageEnter{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

/* Deco */
#floatingDeco{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.deco-item{position:absolute;animation:floatUp linear infinite;opacity:.3;}
@keyframes floatUp{0%{transform:translateY(110vh) rotate(0deg);opacity:0}8%{opacity:.3}92%{opacity:.3}100%{transform:translateY(-120px) rotate(360deg);opacity:0}}

/* Welcome */
#screen-welcome{justify-content:center;text-align:center;gap:22px;position:relative;z-index:1;}
.mascot{display:block;line-height:1;}
.mascot lottie-player{width:120px;height:120px;}
@keyframes mascotBounce{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-14px) rotate(4deg)}}
.welcome-title{font-size:36px;font-weight:900;color:var(--orange);text-shadow:3px 3px 0 rgba(255,107,53,.18);line-height:1.15;}
.welcome-title span{color:var(--teal);}
.welcome-sub{font-size:17px;font-weight:700;color:var(--muted);}

/* Buttons */
.btn-primary{background:linear-gradient(135deg,var(--orange),#FF8C42);color:#fff;border:none;border-radius:50px;padding:18px 52px;font-size:22px;font-weight:900;font-family:inherit;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,0.15), var(--clay-outer);transition:transform 0.1s ease,box-shadow 0.1s ease;}
.btn-primary:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,0,0.15);}
.btn-action{border:none;border-radius:50px;padding:16px 40px;font-size:22px;font-weight:900;font-family:inherit;cursor:pointer;width:100%;box-shadow:0 5px 0 rgba(0,0,0,0.15), var(--clay-outer);transition:transform 0.1s ease,box-shadow 0.1s ease;}
.btn-action:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,0,0.15);}
.btn-action:disabled{opacity:.5;cursor:not-allowed;}
.btn-teal{background:linear-gradient(135deg,var(--teal),#3AB7B0);color:#fff;}
.btn-green{background:linear-gradient(135deg,var(--green),#52b788);color:#fff;}
.btn-orange{background:linear-gradient(135deg,var(--orange),#FF8C42);color:#fff;}

/* Menu */
#screen-menu{gap:14px;max-width:430px;width:100%;margin:0 auto;position:relative;z-index:1;align-items:stretch;}
.menu-header{text-align:center;margin-bottom:6px;}
.menu-header h2{font-size:26px;font-weight:900;}
.menu-header p{font-size:14px;color:var(--muted);font-weight:700;}
.menu-card{background:var(--white);border-radius:var(--radius);padding:0 20px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:var(--clay-outer), var(--clay-inner);border:2px solid rgba(0,0,0,0.04);transition:transform 0.2s ease,border-color .15s,box-shadow 0.2s ease;height:88px;width:100%;overflow:hidden;box-sizing:border-box;}
.menu-card:hover{transform:translateY(-4px);box-shadow:var(--clay-hover);}
.menu-card:active{transform:scale(.97);}
.menu-card.c-orange{border-color:var(--orange);}
.menu-card.c-teal{border-color:var(--teal);}
.menu-card.c-purple{border-color:var(--purple);}
.menu-icon{width:52px;height:52px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.menu-icon img{width:52px;height:52px;object-fit:contain;}
.menu-icon lottie-player{width:52px;height:52px;}
.menu-info{flex:1;}
.menu-title{font-size:20px;font-weight:900;white-space:nowrap;}
.menu-desc{font-size:13px;color:var(--muted);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* emoji img (OpenMoji 已移除) */

/* Game header */
.game-header{display:flex;align-items:center;width:100%;gap:12px;margin-bottom:4px;}
.btn-back{background:var(--white);border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;}
.btn-back:active{transform:scale(.9);}
.progress-wrap{flex:1;background:rgba(0,0,0,.1);border-radius:50px;height:13px;overflow:hidden;position:relative;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--yellow));border-radius:50px;transition:width .5s ease;position:relative;overflow:hidden;}
.stars-badge{font-size:18px;font-weight:900;color:var(--yellow);text-shadow:1px 1px 0 rgba(0,0,0,.2);min-width:58px;text-align:right;}

/* Learn */
#screen-learn{gap:14px;max-width:430px;width:100%;margin:0 auto;position:relative;z-index:1;}
.learn-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;align-items:stretch;}
.learn-card{background:var(--white);border-radius:var(--radius);padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;box-shadow:var(--clay-outer), var(--clay-inner);border:2px solid rgba(0,0,0,0.04);transition:transform .2s,border-color .2s;}
.learn-card:active{transform:scale(.95);}
.learn-card.active{border-color:var(--orange);}
/* 統一圖片區塊高度 */
.learn-img-box{width:100%;height:80px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.learn-img-box img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px;}
.learn-img-box .coin-wrap{width:72px;height:72px;border-radius:50%;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.3);}
.learn-img-box .coin-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.learn-val{font-size:22px;font-weight:900;}
.learn-tw{font-size:11px;color:var(--muted);font-weight:700;}
.learn-tip{background:var(--white);border-radius:var(--radius);padding:14px 18px;text-align:center;box-shadow:var(--shadow);width:100%;font-size:16px;font-weight:800;color:var(--indigo);min-height:56px;display:flex;align-items:center;justify-content:center;}

/* Exchange game */
#screen-game{gap:14px;max-width:430px;width:100%;margin:0 auto;position:relative;z-index:1;}
.question-card{background:var(--white);border-radius:var(--radius);padding:20px 18px;width:100%;text-align:center;box-shadow:var(--clay-outer), var(--clay-inner);border:2px solid rgba(0,0,0,0.04);}
.question-text{font-size:19px;font-weight:800;margin-bottom:16px;}
.from-area{display:flex;justify-content:center;margin-bottom:12px;}
.arrow-bounce{font-size:32px;animation:arrowPulse 1s ease-in-out infinite;margin:2px 0;display:flex;justify-content:center;}
@keyframes arrowPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
.to-area{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:12px;background:#F5F7FA;border-radius:var(--radius-sm);min-height:80px;align-content:flex-start;}
.to-slot{border-radius:8px;border:2.5px dashed #ccc;background:transparent;transition:all .3s ease;}
.to-slot.bill-slot{width:70px;height:42px;}
.to-slot.coin-slot{width:46px;height:46px;border-radius:50%;}
.to-slot.filled{border:none;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(0) rotate(-12deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
.equation-box{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:var(--radius-sm);padding:14px 20px;font-size:24px;font-weight:900;text-align:center;box-shadow:0 6px 20px rgba(102,126,234,.4);display:none;animation:fadeUp .4s ease;margin-top:12px;}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;}
.opt-btn{background:var(--white);border:3px solid #e0e0e0;border-radius:var(--radius-sm);padding:18px;font-size:28px;font-weight:900;font-family:inherit;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .15s,border-color .15s;color:var(--text);}
.opt-btn:active{transform:scale(.95);}
.opt-btn.correct{background:linear-gradient(135deg, #EDFFF1, #C8FFD4);border-color:var(--green);color:#2D7D3A;animation:correctBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);}
.opt-btn.wrong{background:#FFF0F0;border-color:var(--red);color:#C0392B;animation:shake .4s ease;}
@keyframes wiggle{0%,100%{transform:scale(1)}25%{transform:scale(1.1) rotate(-3deg)}75%{transform:scale(1.1) rotate(3deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* Count */
#screen-count{gap:12px;max-width:430px;width:100%;margin:0 auto;position:relative;z-index:1;}
.target-card{background:linear-gradient(135deg,var(--purple),#C77DFF);color:#fff;border-radius:var(--radius);padding:18px;text-align:center;width:100%;box-shadow:0 6px 22px rgba(155,93,229,.42);}
.target-lbl{font-size:15px;font-weight:700;opacity:.88;}.target-num{font-size:52px;font-weight:900;line-height:1;}
.current-card{background:var(--white);border-radius:var(--radius-sm);padding:12px 20px;text-align:center;width:100%;box-shadow:var(--clay-outer), var(--clay-inner);border:2px solid rgba(0,0,0,0.04);font-size:18px;font-weight:800;}
.current-num{font-size:34px;font-weight:900;color:var(--orange);}
.palette{display:flex;flex-direction:column;gap:8px;width:100%;}
.palette-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:transform .15s;}
.palette-item:active{transform:scale(.88);}
.palette-lbl{font-size:11px;font-weight:800;color:var(--muted);}
.selected-pile{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;min-height:64px;padding:12px;background:#F5F7FA;border-radius:var(--radius-sm);width:100%;align-content:flex-start;}
.sel-item{position:relative;cursor:pointer;}
.sel-item::after{content:'✕';position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:900;}
.btn-row{display:flex;gap:10px;width:100%;}
.btn-clear-sm{background:var(--white);color:var(--red);border:3px solid var(--red);border-radius:50px;padding:12px 20px;font-size:17px;font-weight:900;font-family:inherit;cursor:pointer;flex-shrink:0;transition:transform .15s;}
.btn-clear-sm:active{transform:scale(.95);}

/* Celebration */
#celebration{position:fixed;inset:0;background:rgba(0,0,0,.52);display:none;align-items:center;justify-content:center;z-index:200;}
#celebration.active{display:flex;}
.celeb-card{background:#fff;border-radius:32px;padding:40px 32px;text-align:center;max-width:320px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
.celeb-emoji{margin-bottom:10px;display:flex;justify-content:center;align-items:center;}
.celeb-title{font-size:32px;font-weight:900;color:var(--orange);margin-bottom:6px;}
.celeb-sub{font-size:17px;font-weight:700;color:var(--muted);margin-bottom:22px;}
.confetti{position:fixed;border-radius:2px;animation:confettiFall linear forwards;pointer-events:none;z-index:300;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}

/* Done */
#screen-done{justify-content:center;text-align:center;gap:22px;position:relative;z-index:1;}
.done-emoji{display:flex;justify-content:center;}
.done-title{font-size:34px;font-weight:900;color:var(--orange);}
.done-sub{font-size:18px;font-weight:700;color:var(--muted);}
.welcome-hint{font-size:13px;color:#bbb;font-weight:700;}
.total-stars-box{margin-top:auto;padding-top:16px;text-align:center;}
.total-stars-box .star-num{font-size:40px;}
.total-stars-box .star-lbl{font-size:13px;color:var(--muted);font-weight:700;}
/* Icons */
.icon{font-size:1.2em;line-height:1;display:inline-flex;align-items:center;vertical-align:middle;}
/* Shimmer */
.progress-fill::after{content:'';position:absolute;top:0;left:0;width:60px;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent);animation:shimmer 1.8s infinite;}
@keyframes shimmer{0%{transform:translateX(-100px)}100%{transform:translateX(400px)}}
/* Stagger */
@keyframes staggerIn{from{opacity:0;transform:translateY(24px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
/* Correct Bounce */
@keyframes correctBounce{0%{transform:scale(1)}30%{transform:scale(1.12)}60%{transform:scale(0.96)}100%{transform:scale(1)}}
/* Reduced Motion */
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms !important;transition-duration:0.01ms !important;}}
</style>
<!-- Flaticon Uicons 取代 inline SVG symbols -->
</head>
<body>
<div id="floatingDeco"></div>

<!-- WELCOME -->
<div class="screen active" id="screen-welcome">
  <span class="mascot"><lottie-player src="https://assets-v2.lottiefiles.com/a/71563cc8-71d1-11ee-86cd-3790433b0459/EKftAl4MZC.json" autoplay loop></lottie-player></span>
  <div>
    <div class="welcome-title">小小換錢王<br><span>💰 開心學台幣</span></div>
  </div>
  <div class="welcome-sub">點一點，換一換，輕鬆學換算！</div>
  <button class="btn-primary" onclick="goMenu()">開始遊戲</button>
  <div class="welcome-hint">（首次點擊會開啟音效）</div>
</div>

<!-- MENU -->
<div class="screen" id="screen-menu">
  <div class="menu-header"><h2>選擇關卡</h2><p>你想玩哪一個？</p></div>
  <div class="menu-card c-orange" onclick="startLearn()">
    <div class="menu-icon"><lottie-player src="https://assets-v2.lottiefiles.com/a/ccb8811a-116a-11ee-9bc1-f7156a9e0cf3/psCBDdm7J5.json" autoplay loop></lottie-player></div>
    <div class="menu-info"><div class="menu-title" style="color:var(--orange)">認識錢幣</div><div class="menu-desc">點擊看看每張鈔票是多少錢</div></div>
    <div style="font-size:18px;color:var(--muted)"><i class="fi fi-rr-angle-right icon"></i></div>
  </div>
  <div class="menu-card c-teal" onclick="startExchange()">
    <div class="menu-icon"><lottie-player src="https://assets-v2.lottiefiles.com/a/8d7a524c-1176-11ee-88b2-5f4ca597f138/u8qZdCQaHc.json" autoplay loop></lottie-player></div>
    <div class="menu-info"><div class="menu-title" style="color:var(--teal)">換換看</div><div class="menu-desc">大鈔可以換幾張小鈔？</div></div>
    <div style="font-size:18px;color:var(--muted)"><i class="fi fi-rr-angle-right icon"></i></div>
  </div>
  <div class="menu-card c-purple" onclick="startCount()">
    <div class="menu-icon"><lottie-player src="https://assets-v2.lottiefiles.com/a/493f207f-eac1-4a02-a6e8-fc798d445d84/pn9NjfY8WY.json" autoplay loop></lottie-player></div>
    <div class="menu-info"><div class="menu-title" style="color:var(--purple)">算算看</div><div class="menu-desc">用鈔票硬幣湊出指定金額</div></div>
    <div style="font-size:18px;color:var(--muted)"><i class="fi fi-rr-angle-right icon"></i></div>
  </div>
  <div class="total-stars-box">
    <div class="star-num"><i class="fi fi-ss-star icon" style="color:#FFD93D"></i> <span id="totalStars">0</span></div>
    <div class="star-lbl">累計星星</div>
  </div>
</div>

<!-- LEARN -->
<div class="screen" id="screen-learn">
  <div class="game-header">
    <button class="btn-back" onclick="goMenu()"><i class="fi fi-rr-arrow-left icon"></i></button>
    <div style="font-size:20px;font-weight:900;flex:1;text-align:center">認識錢幣</div>
    <div style="width:44px"></div>
  </div>
  <div style="font-size:15px;font-weight:700;color:var(--muted);text-align:center">點一下聽聽看！</div>
  <div class="learn-grid" id="learnGrid"></div>
  <div class="learn-tip" id="learnTip">點擊上方任何一個錢幣 <i class="fi fi-rr-hand-pointer icon"></i></div>
</div>

<!-- EXCHANGE GAME -->
<div class="screen" id="screen-game">
  <div class="game-header">
    <button class="btn-back" onclick="goMenu()"><i class="fi fi-rr-arrow-left icon"></i></button>
    <div class="progress-wrap"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
    <div class="stars-badge"><i class="fi fi-ss-star icon" style="color:#FFD93D"></i> <span id="gameStars">0</span></div>
  </div>
  <div class="question-card" id="phaseShow">
    <div class="question-text" id="qText">loading…</div>
    <div class="from-area"><div id="fromBill"></div></div>
    <div class="arrow-bounce"><i class="fi fi-rr-arrow-down icon"></i></div>
    <div class="to-area" id="toArea"></div>
    <div class="equation-box" id="eqBox"></div>
  </div>
  <button class="btn-action btn-teal" id="btnExchange" onclick="doExchange()"><i class="fi fi-rr-bolt icon"></i> 換！看看能換幾個</button>
  <div id="phaseQuiz" style="display:none;width:100%">
    <div class="question-card" style="margin-bottom:12px">
      <div class="question-text" id="quizText">剛才換了幾個？</div>
    </div>
    <div class="options-grid" id="optionsGrid"></div>
  </div>
</div>

<!-- COUNT GAME -->
<div class="screen" id="screen-count">
  <div class="game-header">
    <button class="btn-back" onclick="goMenu()"><i class="fi fi-rr-arrow-left icon"></i></button>
    <div style="font-size:20px;font-weight:900;flex:1;text-align:center">算算看</div>
    <div class="stars-badge"><i class="fi fi-ss-star icon" style="color:#FFD93D"></i> <span id="countStars">0</span></div>
  </div>
  <div class="target-card"><div class="target-lbl">目標金額</div><div class="target-num" id="targetNum">—</div></div>
  <div class="current-card">現在湊了：<span class="current-num" id="currentNum">0</span> 元</div>
  <div style="font-size:14px;font-weight:700;color:var(--muted);text-align:center">點擊下方錢幣加入 <i class="fi fi-rr-arrow-down icon"></i></div>
  <div class="palette" id="palette"></div>
  <div style="font-size:12px;font-weight:700;color:#aaa;text-align:center">已選（點一下移除）</div>
  <div class="selected-pile" id="selPile"></div>
  <div class="btn-row">
    <button class="btn-clear-sm" onclick="clearSel()"><i class="fi fi-rr-rotate-left icon"></i> 清除</button>
    <button class="btn-action btn-green" style="flex:1;padding:14px 20px;font-size:20px" onclick="checkCount()"><i class="fi fi-rr-check icon"></i> 確認答案</button>
  </div>
</div>

<!-- ALL DONE -->
<div class="screen" id="screen-done">
  <div class="done-emoji"><lottie-player src="https://assets-v2.lottiefiles.com/a/c91264f0-c116-4547-90fa-328b7e2a0c0a/1mo3C04OXC.json" autoplay loop style="width:80px;height:80px"></lottie-player></div>
  <div class="done-title">全部過關！</div>
  <div class="done-sub" id="doneSubtitle">太棒了！</div>
  <button class="btn-primary" onclick="goMenu()">回主選單 <i class="fi fi-rr-home icon"></i></button>
</div>

<!-- CELEBRATION -->
<div id="celebration">
  <div class="celeb-card">
    <div class="celeb-emoji" id="celebEmoji"></div>

let AC=null,bgStarted=false;
function initAudio(){if(AC)return;AC=new(window.AudioContext||window.webkitAudioContext)();startBg();}
function tone(freq,dur,type='sine',vol=0.28,delay=0){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  const t=AC.currentTime+delay;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.02);
  g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.start(t);o.stop(t+dur+.05);
}

function makeDenomEl(v, sizeKey) {
  const d = DENOMS.find(x=>x.v===v);
  if (!d) return document.createElement('div');

  if (d.type === 'bill') {
    // 'learn' → 全寬展示，其他用固定尺寸

      img.style.cssText = 'width:100%;height:auto;display:block;';
      img.alt = d.label;
      wrap.appendChild(img);
      return wrap;
    }
    const {w,h} = BILL_SIZES[sizeKey] || BILL_SIZES.md;
    const wrap = document.createElement('div');
    wrap.style.cssText = `
      width:${w}px; height:auto; position:relative;
      border-radius:7px; overflow:hidden;
      box-shadow:0 4px 14px rgba(0,0,0,.35);
      flex-shrink:0; display:inline-block;

    const img = document.createElement('img');
    img.src = `imgs/${v}.jpg`;
    img.style.cssText = 'width:100%;height:auto;display:block;';
    img.alt = d.label;
    wrap.appendChild(img);
    // xs/sm 加面額小標
    if (sizeKey === 'xs' || sizeKey === 'sm') {
      const lbl = document.createElement('div');
      lbl.textContent = v;
      lbl.style.cssText = `
        position:absolute; bottom:2px; left:4px;
        background:rgba(0,0,0,.55); color:white;
        border-radius:4px; padding:1px 5px;
        font-size:${sizeKey==='xs'?'8':'9'}px; font-weight:900;
        font-family:'Nunito',sans-serif; line-height:1.4;
      `;
      wrap.appendChild(lbl);
    }
    return wrap;

  } else {
    // 硬幣
    const isLearn = sizeKey === 'learn';
    const s = isLearn ? 90 : (COIN_SIZES[sizeKey] || COIN_SIZES.md);
    const wrap = document.createElement('div');
    wrap.style.cssText = `
      width:${s}px; height:${s}px; position:relative;
      border-radius:50%; overflow:hidden;
      box-shadow:0 4px 12px rgba(0,0,0,.35);
      flex-shrink:0; display:inline-block;
    `;

    img.src = `imgs/${v}.jpg`;

    if (v === 50) {
      img.style.cssText = 'width:200%;height:100%;object-fit:cover;object-position:left center;display:block;';
    } else {
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    }
    wrap.appendChild(img);
    return wrap;
  }
}

// 洗牌
function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// 隨機產生「算算看」目標金額（100~1500 之間，不超過 20 步能湊出）
function genCountTarget() {
  const pools = [
    [1000,1,1],[500,1,1],[200,1,2],[100,1,5],[50,1,5],[10,1,9]
  ];
  for(let attempt=0;attempt<20;attempt++){
    // 隨機挑 2~4 種面值，組合出目標
    const shuffled = shuffle(pools);
    const picked = shuffled.slice(0, 2+Math.floor(Math.random()*3));
    let total = 0;
    picked.forEach(([v,min,max])=>{
      const cnt = min + Math.floor(Math.random()*(max-min+1));
      total += v * cnt;
    });
    if(total>=100 && total<=1500) return total;
  }
  return 350; // fallback
}

function startExchange(){

function loadExchange(){
  if(S.exchIdx>=EXCHANGE_Q.length){showAllDone();return;}
  S.cur=EXCHANGE_Q[S.exchIdx];S.phase='quiz';
  const{from,to,ans}=S.cur;
  const fd=denom(from),td=denom(to);

  document.getElementById('progressBar').style.width=(S.exchIdx/EXCHANGE_Q.length*100)+'%';

  // 題目文字
  const toLabel=td.type==='bill'?`張 ${td.label}`:`枚 ${td.label}`;
  document.getElementById('qText').textContent=`${fd.label} 可以換幾${toLabel}？`;

  // 顯示大鈔
  const fb=document.getElementById('fromBill');
  fb.innerHTML='';fb.appendChild(makeDenomEl(from,'xl'));

  // 空位（佔位用，動畫前不顯示內容）
  const ta=document.getElementById('toArea');ta.innerHTML='';
  for(let i=0;i<ans;i++){
    const slot=document.createElement('div');
    slot.className=`to-slot ${td.type==='coin'?'coin-slot':'bill-slot'}`;
    slot.id='slot'+i;ta.appendChild(slot);
  }

  // 隱藏方程式 + 換按鈕 + 空槽區（選完才顯示）
  document.getElementById('eqBox').style.display='none';
  document.getElementById('btnExchange').style.display='none';
  document.getElementById('toArea').style.visibility='hidden';
  document.getElementById('toArea').style.opacity='0';

  // ★ 直接顯示選擇題
  const quizText=td.type==='bill'?`請問可以換幾張 ${td.label}？`:`請問可以換幾枚 ${td.label}？`;
  document.getElementById('quizText').textContent=quizText;

  const opts=new Set([ans]);
  const deltas=[1,2,3,5,8,10];let di=0;
  while(opts.size<4){
    const delta=deltas[di++]||Math.floor(Math.random()*8+1);
    const w=ans+(Math.random()>.5?1:-1)*delta;
    if(w>0&&w!==ans)opts.add(w);
  }
  const grid=document.getElementById('optionsGrid');grid.innerHTML='';
  [...opts].sort(()=>Math.random()-.5).forEach(v=>{
    const b=document.createElement('button');
    b.className='opt-btn';b.textContent=v;
    b.onclick=()=>handleOpt(v,ans,b);grid.appendChild(b);
  });
  document.getElementById('phaseQuiz').style.display='block';
}

async function handleOpt(chosen,ans,btn){
  if(S.phase!=='quiz')return;
  S.phase='animating';
  document.querySelectorAll('.opt-btn').forEach(b=>b.onclick=null);

  const correct=(chosen===ans);
  if(correct){
    btn.classList.add('correct');sfxCorrect();
    S.gameStars++;document.getElementById('gameStars').textContent=S.gameStars;
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b=>{if(parseInt(b.textContent)===ans)b.classList.add('correct');});
    sfxWrong();
  }

  // 短暫停頓讓使用者看到答案標示，再播動畫
  await delay(700);
  document.getElementById('phaseQuiz').style.display='none';
  await runExchangeAnim();
  celebrate(correct, correct?`${ans} 個！答對了！`:`正確答案是 ${ans} 個，繼續加油！`);
}

async function runExchangeAnim(){
  const{from,to,ans}=S.cur;
  const td=denom(to);
  // 顯示空槽區
  const ta=document.getElementById('toArea');
  ta.style.visibility='visible';
  ta.style.transition='opacity .3s';
  ta.style.opacity='1';
  await delay(200);
  for(let i=0;i<ans;i++){
    await delay(150);
    const slot=document.getElementById('slot'+i);
    if(!slot)continue;
    slot.classList.add('filled');
    const el=makeDenomEl(to,'xs');
    if(td.type==='coin'){el.style.width='40px';el.style.height='40px';}
    slot.appendChild(el);
    sfxCoin(i);
  }
  await delay(300);
  const eq=document.getElementById('eqBox');
  eq.textContent=`${from} = ${ans} × ${to}`;
  eq.style.display='block';
  sfxCoin(ans);
  await delay(900);
}

function startCount(){
  initAudio();sfxClick();

  }
  S.selBills=[];S.countIdx=0;S.countStars=0;
  document.getElementById('countStars').textContent=0;
  loadCount();showScreen('screen-count');
}
function loadCount(){
  // 超過預設題數就再隨機產生一題
  if(S.countIdx>=COUNT_TARGETS.length){
    COUNT_TARGETS.push(genCountTarget());
  }
  const target=COUNT_TARGETS[S.countIdx];
  S.countTarget=target;S.selBills=[];
  document.getElementById('targetNum').textContent=target+' 元';
  document.getElementById('currentNum').textContent='0';
  document.getElementById('currentNum').style.color='var(--orange)';
  document.getElementById('selPile').innerHTML='';
  const pal=document.getElementById('palette');pal.innerHTML='';

  const availDenoms = DENOMS.filter(d=>d.v<=target);
  const bills = availDenoms.filter(d=>d.type==='bill');
  const coins = availDenoms.filter(d=>d.type==='coin');

  function makeRow(items) {
    if(!items.length) return;
    const row=document.createElement('div');
    row.style.cssText='display:flex;gap:8px;width:100%;align-items:flex-end;';
    items.forEach(d=>{
      const wrap=document.createElement('div');
      wrap.className='palette-item';
      wrap.style.cssText='flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:4px;';

      // 響應式貨幣圖示
      if(d.type==='bill'){
        const imgWrap=document.createElement('div');
        imgWrap.style.cssText='width:100%;border-radius:6px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.28);background:#eee;';
        const img=document.createElement('img');
        img.src=`imgs/${d.v}.jpg`;img.alt=d.label;
        img.style.cssText='width:100%;height:auto;display:block;';
        imgWrap.appendChild(img);wrap.appendChild(imgWrap);
      } else {
        const imgWrap=document.createElement('div');
        imgWrap.style.cssText='width:100%;aspect-ratio:1/1;border-radius:50%;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.28);';
        const img=document.createElement('img');
        img.src=`imgs/${d.v}.jpg`;img.alt=d.label;
        img.style.cssText=d.v===50?'width:200%;height:100%;object-fit:cover;object-position:left center;display:block;':'width:100%;height:100%;object-fit:cover;display:block;';
        imgWrap.appendChild(img);wrap.appendChild(imgWrap);
      }

      const lbl=document.createElement('div');lbl.className='palette-lbl';lbl.textContent='+'+d.v;
      wrap.appendChild(lbl);wrap.onclick=()=>addBill(d.v);row.appendChild(wrap);
    });
    pal.appendChild(row);
  }

  makeRow(bills);
  makeRow(coins);
}
function addBill(v){
  initAudio();S.selBills.push(v);
  const total=S.selBills.reduce((a,b)=>a+b,0);
  const el=document.getElementById('currentNum');el.textContent=total;
  if(total>S.countTarget)el.style.color='var(--red)';
  else if(total===S.countTarget){el.style.color='var(--green)';sfxCorrect();}
  else el.style.color='var(--orange)';
  renderSelPile();tone(400+S.selBills.length*15,.09,'sine',.18);
}
function renderSelPile(){
  const pile=document.getElementById('selPile');pile.innerHTML='';
  S.selBills.forEach((v,i)=>{
    const wrap=document.createElement('div');wrap.className='sel-item';
    const d=denom(v);
    wrap.appendChild(makeDenomEl(v,'xs'));
    wrap.onclick=()=>{
      S.selBills.splice(i,1);
      const t=S.selBills.reduce((a,b)=>a+b,0);
      document.getElementById('currentNum').textContent=t;
      document.getElementById('currentNum').style.color='var(--orange)';
      renderSelPile();sfxClick();
    };pile.appendChild(wrap);
  });
}
function clearSel(){initAudio();sfxClick();S.selBills=[];document.getElementById('currentNum').textContent='0';document.getElementById('currentNum').style.color='var(--orange)';document.getElementById('selPile').innerHTML='';}
function checkCount(){
  initAudio();const total=S.selBills.reduce((a,b)=>a+b,0);
  if(total===S.countTarget){sfxCorrect();S.countStars++;document.getElementById('countStars').textContent=S.countStars;celebrate(true,`你用錢幣湊出了 ${total} 元！`);}
  else if(total<S.countTarget){sfxWrong();celebrate(false,`還差 ${S.countTarget-total} 元，再加一些！`);}
  else{sfxWrong();celebrate(false,`多了 ${total-S.countTarget} 元，拿掉一些！`);}
}

<script>
  // 禁用雙擊（避免誤動作：文字選取、縮放）
  document.addEventListener('dblclick', e => e.preventDefault());
  // 禁用長按選單（iOS Safari）
  document.addEventListener('contextmenu', e => e.preventDefault());
  // 禁止 iOS Safari pinch-to-zoom（iOS 10+ 忽略 viewport user-scalable）
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
  document.addEventListener('gesturechange', function(e){ e.preventDefault(); });
  document.addEventListener('gestureend', function(e){ e.preventDefault(); });
  // 記錄觸碰起點，用來判斷滑動方向
  let _touchStartY = 0;
  document.addEventListener('touchstart', function(e){
    _touchStartY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchmove', function(e){
    // 多指（pinch）一律阻擋
    if (e.touches.length > 1) { e.preventDefault(); return; }
    // 只在頁面頂端、且手指往下拉時才阻擋（避免 pull-to-refresh）
    const scrollTop = document.scrollingElement ? document.scrollingElement.scrollTop : 0;
    const movingDown = e.touches[0].clientY > _touchStartY;
    if (scrollTop === 0 && movingDown) { e.preventDefault(); }
  }, { passive: false });
</script>
